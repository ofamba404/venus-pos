<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <meta name="description" content="Venus POS register — today's sales, stock glance, and product checkout.">

  <link rel="canonical" href="https://posvenus.netlify.app/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Venus POS">
  <meta property="og:title" content="Venus POS">
  <meta property="og:description" content="Venus POS register — today's sales, stock glance, and product checkout.">
  <meta property="og:url" content="https://posvenus.netlify.app/">
  <meta property="og:image" content="https://posvenus.netlify.app/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Venus POS">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Venus POS">
  <meta name="twitter:description" content="Venus POS register — today's sales, stock glance, and product checkout.">
  <meta name="twitter:image" content="https://posvenus.netlify.app/assets/og-image.png">
  <link rel="icon" href="assets/logo-browser.svg?v=5" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=4" sizes="180x180">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Venus POS">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://xiangrykfxlnacthjcad.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="modulepreload" href="js/pages/home.js">
  <link rel="modulepreload" href="js/bootstrap.js">
  <link rel="modulepreload" href="js/store/data-store.js">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body data-page="home">
  <div id="app-root">
    <div class="dashboard">
      <div class="kpi-grid">
        <button class="kpi-card kpi-revenue" id="todayRevenueStat" type="button">
          <div class="val is-pending" id="todayRevenue">UGX —</div>
          <div class="lbl">Today's revenue</div>
        </button>
        <button class="kpi-card kpi-units" id="todayUnitsStat" type="button">
          <div class="sold-row">
            <div class="sold-item">
              <div class="val is-pending" id="todayJoints">—</div>
              <div class="sold-sub">joints</div>
            </div>
            <div class="sold-sep"></div>
            <div class="sold-item">
              <div class="val is-pending" id="todayCookies">—</div>
              <div class="sold-sub">cookies</div>
            </div>
          </div>
        </button>
      </div>

      <div class="stock-card stock-summary" id="stockGlance">
        <div class="stock-split" role="button" tabindex="0" aria-label="View inventory">
          <div class="stock-split-item stock-joints">
            <div class="donut-container mini">
              <div class="donut" id="donutJoints"></div>
              <div class="donut-hole">
                <div class="donut-total is-pending" id="donutJointsTotal">—</div>
                <div class="donut-caption">joints</div>
              </div>
            </div>
          </div>
          <div class="stock-split-sep"></div>
          <div class="stock-split-item stock-cookies">
            <div class="stock-stat">
              <div class="stock-stat-val is-pending" id="cookieStockTotal">—</div>
              <div class="stock-stat-label">cookies</div>
              <div class="stock-stat-meter" aria-hidden="true">
                <div class="stock-stat-meter-fill" id="cookieStockFill"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="donut-status" id="donutStatus">
          <div class="ds-group ds-joints">
            <div class="ds-group-label">Joints</div>
            <div class="ds-group-stats">
              <span class="ds-ok is-pending">···</span>
              <span class="ds-sep">·</span>
              <span class="ds-low is-pending">···</span>
              <span class="ds-sep">·</span>
              <span class="ds-out is-pending">···</span>
            </div>
          </div>
        </div>
      </div>

      <div class="section-head">
        <h2>Checkout</h2>
        <span class="section-hint">Tap a product to sell</span>
      </div>
      <div class="product-list" id="productList">
        <button class="product-row" type="button" data-product="scout">
          <div>
            <div class="pname">Scout Pack</div>
            <div class="pcount">1 joint</div>
          </div>
          <div class="p-right">
            <div class="pprice">UGX 8,000</div>
          </div>
        </button>
        <button class="product-row" type="button" data-product="pilot">
          <div>
            <div class="pname">Pilot Pack</div>
            <div class="pcount">2 joints</div>
          </div>
          <div class="p-right">
            <div class="pprice">UGX 15,000</div>
          </div>
        </button>
        <button class="product-row" type="button" data-product="commander">
          <div>
            <div class="pname">Commander's Stash</div>
            <div class="pcount">5 joints</div>
          </div>
          <div class="p-right">
            <div class="pprice">UGX 35,000</div>
          </div>
        </button>
        <button class="product-row" type="button" data-product="variety">
          <div>
            <div class="pname">Variety Pack</div>
            <div class="pcount">8 joints</div>
          </div>
          <div class="p-right">
            <div class="pprice">UGX 50,000</div>
          </div>
        </button>
        <button class="product-row" type="button" data-product="plain_single">
          <div>
            <div class="pname">Plain</div>
            <div class="pcount">per joint</div>
          </div>
          <div class="p-right">
            <div class="pprice">UGX 5,000</div>
          </div>
        </button>
        <button class="product-row" type="button" data-product="spliff_single">
          <div>
            <div class="pname">Bangis</div>
            <div class="pcount">per joint</div>
          </div>
          <div class="p-right">
            <div class="pprice">UGX 5,000</div>
          </div>
        </button>
        <button class="product-row" type="button" data-product="cookie_single">
          <div>
            <div class="pname">Cookies</div>
            <div class="pcount">per cookie</div>
          </div>
          <div class="p-right">
            <div class="pprice">UGX 5,000</div>
          </div>
        </button>
      </div>
    </div>
  </div>
  <script type="module" src="js/pages/home.js"></script>
</body>
</html>
